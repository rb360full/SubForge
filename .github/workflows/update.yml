name: Update

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      telegram_session_string:
        description: "Optional Telethon session string for manual runs"
        required: false
        type: string

jobs:
  generate-subscription:
    runs-on: ubuntu-latest
    # دسترسی به write برای اعمال تغییرات در ریپازیتوری الزامی است
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set TELEGRAM_SESSION_STRING
        run: |
          if [ -n "${{ github.event.inputs.telegram_session_string }}" ]; then
            echo "TELEGRAM_SESSION_STRING=${{ github.event.inputs.telegram_session_string }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.TELEGRAM_SESSION_STRING }}" ]; then
            echo "TELEGRAM_SESSION_STRING=${{ secrets.TELEGRAM_SESSION_STRING }}" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && pip install .

      - name: Validate Telegram session secret
        run: |
          if [ -n "${TELEGRAM_SESSION_STRING}" ]; then
            echo "Using TELEGRAM_SESSION_STRING from secret or manual workflow input."
          elif [ -f "subforge.session" ]; then
            echo "Using repository session file subforge.session."
          else
            echo "Provide TELEGRAM_SESSION_STRING as a repo secret or manual workflow input, or ensure subforge.session exists."
            exit 1
          fi

      - name: Generate subscription
        run: python src/runner.py

      # ذخیره تغییرات در ریپازیتوری
      - name: Commit and push changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscriptions/ || true
          # بررسی اینکه آیا تغییری وجود دارد یا خیر (staged changes)
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update subscription [ci skip]"
            git push origin HEAD
          fi

      # اگر همچنان می‌خواهی فایل در بخش Actions هم به عنوان آرتیفکت بماند، این مرحله را نگه دار
      - name: Upload subscription artifact
        uses: actions/upload-artifact@v4
        with:
          name: subforge-subscription
          path: subscriptions/
