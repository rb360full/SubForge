name: Update

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      telegram_session_string:
        description: "Optional Telethon session string for manual runs"
        required: false
        type: string

jobs:
  generate-subscription:
    runs-on: ubuntu-latest
    # دسترسی به write برای اعمال تغییرات در ریپازیتوری الزامی است
    permissions:
      contents: write
    env:
      TELEGRAM_SESSION_STRING: ${{ inputs.telegram_session_string || secrets.TELEGRAM_SESSION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && pip install .

      - name: Validate Telegram session secret
        run: |
          if [ -z "${TELEGRAM_SESSION_STRING}" ]; then
            echo "Provide TELEGRAM_SESSION_STRING as a repo secret or manual workflow input."
            exit 1
          fi

      - name: Generate subscription
        run: python src/runner.py

      # ذخیره تغییرات در ریپازیتوری
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscriptions/default.txt
          # بررسی اینکه آیا تغییری وجود دارد یا خیر
          if ! git diff --quiet; then
            git commit -m "Update subscription [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      # اگر همچنان می‌خواهی فایل در بخش Actions هم به عنوان آرتیفکت بماند، این مرحله را نگه دار
      - name: Upload subscription artifact
        uses: actions/upload-artifact@v4
        with:
          name: subforge-subscription
          path: subscriptions/default.txt
