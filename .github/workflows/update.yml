name: Update

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  generate-subscription:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && pip install .

      - name: Validate Telegram session secret
        run: |
          if [ -z "${TELEGRAM_SESSION_STRING}" ]; then
            echo "TELEGRAM_SESSION_STRING secret is required for scheduled runs."
            exit 1
          fi

      - name: Generate subscription
        run: python src/runner.py

      - name: Upload subscription artifact
        uses: actions/upload-artifact@v4
        with:
          name: subforge-subscription
          path: subscriptions/default.txt
